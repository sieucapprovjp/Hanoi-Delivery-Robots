<!DOCTYPE html>
<html>
<head>
    <title>Mô phỏng Giao hàng - Hoàn Kiếm</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style> #map { height: 600px; width: 100%; } </style>
</head>
<body>
    <h2>Hệ thống Giao hàng Đa Tác Vụ</h2>
    <div id="map"></div>

    <script>
        // 1. Khởi tạo bản đồ, lấy tâm là Hà Nội
        var map = L.map('map').setView([21.0285, 105.8541], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. Tạo các Marker cho Robot
        var marker1 = L.marker([0, 0]).addTo(map).bindPopup("Robot 1");
        var marker2 = L.marker([0, 0]).addTo(map).bindPopup("Robot 2");

        // 3. Hàm lấy dữ liệu từ Python và vẽ lên bản đồ
        function fetchRobotData() {
            fetch('http://localhost:5000/api/robots')
                .then(response => response.json())
                .then(data => {
                    // Cập nhật vị trí mới cho các Marker
                    marker1.setLatLng([data.robot_1.lat, data.robot_1.lon]);
                    marker2.setLatLng([data.robot_2.lat, data.robot_2.lon]);
                });
        }

        // Cứ mỗi 500ms (0.5 giây) lại chạy hàm fetchRobotData một lần
        setInterval(fetchRobotData, 500);
    </script>
</body>
</html>
